name: Build sing-box ruleset
on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"
      - "**/*.ini"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        id: vars
        run: |
          UPDATE_VER=$(date -d '+8 hours' +%Y-%m-%d)
          echo "update_version=$UPDATE_VER" >> ${GITHUB_ENV}
          echo "update_version=$UPDATE_VER" >> ${GITHUB_OUTPUT}
          echo "domains_download_url=https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset" >> ${GITHUB_ENV}
          echo "ips_download_url=https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset" >> ${GITHUB_ENV}
        shell: bash

      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Download rule source files
        run: |
          mkdir -p ./tools/rules/ ./tools/domains/ ./tools/ips/ ./tmp/
          domains=(private ads trackerslist microsoft-cn apple-cn google-cn games-cn netflix disney max primevideo appletv youtube tiktok bilibili spotify media games ai networktest tld-proxy gfw proxy cn cn-lite)
          ips=(netflixip mediaip gamesip privateip cnip telegramip)

          # Download for sing-box
          for domain in "${domains[@]}"; do
            mkdir -p "./tools/rules/${domain}/"
            curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/${domain}.list" > "./tools/rules/${domain}/${domain}.list"
          done

          mkdir -p ./tools/rules/fakeip-filter/
          curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/fakeip-filter.list" | awk '!/(DOMAIN-REGEX,|ntp|stun|time)/' > ./tmp/temp-fakeip-filter-rules.txt
          printf "DOMAIN-KEYWORD,ntp\nDOMAIN-KEYWORD,stun\nDOMAIN-KEYWORD,time\n" >> ./tmp/temp-fakeip-filter-rules.txt
          curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/fakeip-filter.list" | awk '/DOMAIN-REGEX,/ && !/(ntp|stun|time)/' >> ./tmp/temp-fakeip-filter-rules.txt
          sort --ignore-case ./tmp/temp-fakeip-filter-rules.txt > ./tools/rules/fakeip-filter/fakeip-filter.list

          mkdir -p ./tools/rules/fakeip-filter-lite/
          curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/fakeip-filter-lite.list" | awk '!/(DOMAIN-REGEX,|ntp|stun|time)/' > ./tmp/temp-fakeip-filter-lite-rules.txt
          printf "DOMAIN-KEYWORD,ntp\nDOMAIN-KEYWORD,stun\nDOMAIN-KEYWORD,time\n" >> ./tmp/temp-fakeip-filter-lite-rules.txt
          sort --ignore-case ./tmp/temp-fakeip-filter-lite-rules.txt > ./tools/rules/fakeip-filter-lite/fakeip-filter-lite.list

          mkdir -p ./tools/rules/applications/
          curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/applications.list" > "./tools/rules/applications/applications.list"

          for ip in "${ips[@]}"; do
            mkdir -p "./tools/rules/${ip}/"
            curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${ips_download_url}/${ip}.list" > "./tools/rules/${ip}/${ip}.list"
          done

          # Download for mihomo
          for domain in "${domains[@]}"; do
            mkdir -p "./tools/domains/${domain}/"
            # Ensure folder exists even if no rules match
            curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/${domain}.list" | awk '/(DOMAIN,|DOMAIN-SUFFIX,)/' | sed -e 's/DOMAIN,//' -e 's/DOMAIN-SUFFIX,/+\./' > "./tools/domains/${domain}/${domain}.list"
            curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/${domain}.list" | awk '/DOMAIN-REGEX,/' | sed -e 's/\\s/ /' -e 's/\\./\./g' -e 's/\[^.\]+/*/g' -e 's/\^\.\*/\^+/' -e 's/.*\^//; s/\$//' >> "./tools/domains/${domain}/${domain}.list"
          done

          mkdir -p ./tools/domains/fakeip-filter/
          curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/fakeip-filter.list" | awk '!/DOMAIN-REGEX,/' | sed -e 's/DOMAIN,//' -e 's/DOMAIN-SUFFIX,/+\./' > ./tmp/temp-fakeip-filter-mihomo.txt
          printf "+.ntp\n+.stun\n+.time\n" >> ./tmp/temp-fakeip-filter-mihomo.txt
          curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/fakeip-filter.list" | awk '/DOMAIN-REGEX,/' | sed -e 's/\\s/ /' -e 's/\\./\./g' -e 's/\[^.\]+/*/g' -e 's/\^\.\*/\^+/' -e 's/.*\^//; s/\$//' >> ./tmp/temp-fakeip-filter-mihomo.txt
          sort --ignore-case ./tmp/temp-fakeip-filter-mihomo.txt > ./tools/domains/fakeip-filter/fakeip-filter.list

          mkdir -p ./tools/domains/fakeip-filter-lite/
          curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${domains_download_url}/fakeip-filter-lite.list" | awk '!/DOMAIN-REGEX,/' | sed -e 's/DOMAIN,//' -e 's/DOMAIN-SUFFIX,/+\./' > ./tmp/temp-fakeip-filter-lite-mihomo.txt
          printf "+.ntp\n+.stun\n+.time\n" >> ./tmp/temp-fakeip-filter-lite-mihomo.txt
          sort --ignore-case ./tmp/temp-fakeip-filter-lite-mihomo.txt > ./tools/domains/fakeip-filter-lite/fakeip-filter-lite.list

          for ip in "${ips[@]}"; do
            mkdir -p "./tools/ips/${ip}/"
            curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "${ips_download_url}/${ip}.list" | sed 's/.*,//' > "./tools/ips/${ip}/${ip}.list"
          done

          # Download AWAvenue Ads Rule
          mkdir -p ./tools/awavenue/
          curl -sSLf --retry 5 --retry-delay 5 --retry-all-errors "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/Filters/AWAvenue-Ads-Rule-Singbox.json" > ./tools/awavenue/awavenue.json
          rm -rf ./tmp*

      - name: Generate `mihomo` rule-set (mrs)
        run: |
          mkdir -p ./sing-box-ruleset/
          curl -L --retry 5 --retry-delay 5 --retry-all-errors https://github.com/DustinWin/proxy-tools/releases/download/mihomo/mihomo-meta-linux-amd64-v3.tar.gz | tar -zx -C ./tools/
          mv -f ./tools/CrashCore ./tools/mihomo
          chmod +x ./tools/mihomo
          
          cd ./tools/
          list=($(ls ./domains/))
          for ((i = 0; i < ${#list[@]}; i++)); do
            if [ -s "./domains/${list[i]}/${list[i]}.list" ]; then
              echo "Converting domain rule: ${list[i]}"
              ./mihomo convert-ruleset domain text "./domains/${list[i]}/${list[i]}.list" ../sing-box-ruleset/${list[i]}.mrs
            else
              echo "Skipping empty domain rule: ${list[i]}"
            fi
          done

          list=($(ls ./ips/))
          for ((i = 0; i < ${#list[@]}; i++)); do
            if [ -s "./ips/${list[i]}/${list[i]}.list" ]; then
              echo "Converting ip rule: ${list[i]}"
              ./mihomo convert-ruleset ipcidr text "./ips/${list[i]}/${list[i]}.list" ../sing-box-ruleset/${list[i]}.mrs
            else
              echo "Skipping empty ip rule: ${list[i]}"
            fi
          done
          
          rm -rf ./mihomo ./domains/ ./ips/

      - name: Generate `sing-box` rule_set (srs)
        run: |
          # Get latest version of sing-box
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          LATEST_VERSION=$(echo $LATEST_TAG | sed 's/^v//')
          echo "singbox_core_new_version=${LATEST_VERSION}" >> $GITHUB_ENV

          # Use a more robust download and extraction logic
          mkdir -p ./tools/sb_bin/
          curl -L --retry 5 --retry-delay 5 --retry-all-errors "https://github.com/SagerNet/sing-box/releases/download/${LATEST_TAG}/sing-box-${LATEST_VERSION}-linux-amd64.tar.gz" | tar -zx -C ./tools/sb_bin/
          find ./tools/sb_bin/ -name "sing-box" -type f -exec mv {} ./tools/sing-box \;
          rm -rf ./tools/sb_bin/
          
          cd ./tools/
          # Fix potential line ending issues
          sed -i 's/\r$//' ./convert.sh
          chmod +x ./convert.sh && ./convert.sh

          # Compile AWAvenue for sing-box
          ./sing-box rule-set compile --output ../sing-box-ruleset/awavenue.srs ./awavenue/awavenue.json

          # Move only srs files
          mv -f ./*.srs ../sing-box-ruleset/
          rm -rf ./rules* ./awavenue/


      - name: Git push assets to "master" branch
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # 清理中间产生的 .json 文件，避免干扰
          rm -f ./tools/*.json
          # 清理 0 字节的文件，防止发布失败
          find ./sing-box-ruleset/ -type f -empty -delete
          git add ./sing-box-ruleset/*
          # 检查是否有文件变动，只有在有变动时才 commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update sing-box and mihomo rule-set ($update_version)"
            git push -u origin master
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: always() # 即使没有代码变动，也可以强制运行（或者您也可以改为有变动才运行）
        with:
          tag_name: sing-box-ruleset
          body: |
            更新时间: ${{ steps.vars.outputs.update_version }}
            
            包含规则：
            - sing-box 规则集 (.srs)
            - mihomo 规则集 (.mrs)
            - 秋风去广告规则 (awavenue.srs)
          files: |
            ./sing-box-ruleset/*.srs
            ./sing-box-ruleset/*.mrs
            ./sing-box-ruleset/*.list
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

